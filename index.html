<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>🎵 SoundWave</title>

    <!-- 구글 폰트 -->
     <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet"/>

     <link rel="stylesheet" href="style.css"/>
</head>
<body>

    <!-- 헤더 -->
     <header>
        <div class="logo">SOUNDWAVE</div>
        <nav>
            <a class="active" onclick="showPage('chart')">차트</a>
            <a>장르</a>
            <a>신곡</a>
            <a onclick="showPage('playlist')">플레이리스트</a>
        </nav>
        <div class="header-actions">
            <button class="btn-ghost">로그인</button>
            <button class="btn-accent">무료 가입</button>
        </div>
     </header>

     <!-- 히어로 섹션 -->
      <div class="hero">
        <div class="hero-text">
            <h1>지금 <span>가장 뜨거운</span><br>음악 차트</h1>
            <p>실시간으로 업데이트되는 국내·해외 TOP 20</p>
        </div>
        <div class="hero-stats">
            <div class="stat-item">
                <div class="stat-num">100</div>
                <div class="stat-label">TOP SONGS</div>
            </div>
            <div class="stat-item">
                <div class="stat-num">24H</div>
                <div class="stat-label">UPDATED</div>
            </div>
            <div class="stat-item">
                <div class="stat-num">4.2M</div>
                <div class="stat-label">LISTENERS</div>
            </div>
        </div>
        </div>

    <!-- 메인 컨텐츠 -->
    <div id="chartPage">
        <div class="main">

            <!-- 왼쪽: 차트 목록 -->
            <div class="chart-section">
                <div class="section-header">
                    <div class="section-title">
                        <div class="dot"></div>
                        실시간 TOP 20
                    </div>
                    <div class="chart-tabs">
                        <button class="tab-btn active" onclick="switchTab(this, 'domestic')">국내</button>
                        <button class="tab-btn" onclick="switchTab(this, 'global')">해외</button>
                    </div>
                </div>
                <div class="chart-list" id="chartList"></div>
            </div>

            <!-- 오른쪽: 사이드바 -->
            <div class="sidebar">

                <!-- 지금 재생 중 -->
                <div class="card">
                    <div class="section-title" style="margin-bottom:16px">
                        <div class="dot"></div>
                        지금 재생 중
                    </div>
                    <div class="now-playing-cover" id="npCover">🎵</div>
                    <div class="np-title" id="npTitle">곡을 선택하세요</div>
                    <div class="np-artist" id="npArtist">-</div>

                    <!-- 진행바 -->
                    <div class="progress-wrap">
                        <div class="progress-bg">
                            <div class="progress-fill" id="progressFill" style="width:0%"></div>
                        </div>
                        <div class="progress-times">
                            <span id="curTime">0:00</span>
                            <span id="totalTime">0:00</span>
                        </div>
                    </div>

                    <!-- 컨트롤 버튼 -->
                    <div class="controls">
                        <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
                        <button class="ctrl-play" id="playBtn" onclick="togglePlay()">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <polygon points="6,3 20 12 6,21"/>
                            </svg>
                        </button>
                        <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
                    </div>
                </div>

                <!-- 트렌딩 태그 -->
                <div class="card">
                    <div class="section-title" style="margin-bottom:14px">
                        <div class="dot" style="background:#00b8ff;"></div>
                        트렌딩 태그
                    </div>
                    <div class="tag-list">
                        <span class="tag"># 발라드</span>
                        <span class="tag"># K-POP</span>
                        <span class="tag"># 힙합</span>
                        <span class="tag"># R&B</span>
                        <span class="tag"># 인디</span>
                        <span class="tag"># OST</span>
                        <span class="tag"># 팝</span>
                        <span class="tag"># 댄스</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 플레이리스트 페이지 -->
    <div id="playlistPage" style="display:none;">
        <div class="main" style="grid-template-columns: 1fr;">
            <div class="chart-section">
                <div class="section-header">
                    <div class="section-title">
                        <div class="dot" style="background:var(--accent2);"></div>
                        내 플레이리스트
                    </div>
                    <div style="font-size:13px; color:var(--muted);" id="playlistCount">0곡</div>
                </div>
                <div class="chart-list" id="playlistItems"></div>
            </div>
        </div>
    </div>
        

    <!-- 하단 플레이어 바 -->
    <div id="player-bar">
        <div class="pb-track">
            <div class="pb-cover" id="pbCover">🎵</div>
            <div>
                <div class="pb-title" id="pbTitle">곡을 선택하세요</div>
                <div class="pb-artist" id="pbArtist">-</div>
            </div>
        </div>
        <div class="pb-center">
            <div class="pb-controls">
                <button class="pb-ctrl" onclick="prevTrack()">⏮</button>
                <button class="pb-play" id="pbPlayBtn" onclick="togglePlay()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="6,3 20,12 6,21"/>
                    </svg>
                </button>
                <button class="pb-ctrl" onclick="nextTrack()">⏭</button>
            </div>
            <div class="pb-progress">
                <span id="pbCurTime">0:00</span>
                <div class="pb-bar-bg">
                    <div class="pb-bar-fill" id="pbBarFill" style="width:0%"></div>
                </div>
                <span id="pbTotalTime">0:00</span>
            </div>
        </div>
        <div class="pb-right">
            <button class="icon-btn">🤍</button>
            <button class="icon-btn">➕</button>
        </div>
    </div>

    <!-- JS파일 연결 -->
     <script src="app.js"></script>
     <div id="toast"></div>
</body>
</html>
